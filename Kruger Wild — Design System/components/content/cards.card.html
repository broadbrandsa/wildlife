<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cards — Kruger Wild</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, PhotoPlate, Eyebrow, Tag, Badge, Button } = window.KrugerWildDesignSystem_6ab219;
  function Demo() {
    return (
      <div className="grid">
        <Card
          media={<PhotoPlate wash="bushveld" icon="paw-print" label="Panthera pardus" />}
          mediaHeight={150}
          eyebrow={<Badge status="vu" />}
          title="Leopard"
          meta="CREPUSCULAR · SOLITARY"
          description="The most elusive of the Big Five — secretive, nocturnal, and rarely seen in daylight."
          footer={<><Tag tone="green" icon={<i className="ph ph-tree" />}>Riverine</Tag><Button size="sm" variant="ghost" iconRight={<i className="ph ph-arrow-right" />}>View</Button></>}
        />
        <Card
          media={<PhotoPlate wash="savanna" icon="bird" label="Sagittarius serpentarius" />}
          mediaHeight={150}
          eyebrow={<Eyebrow>Field Note</Eyebrow>}
          title="Secretary Bird"
          meta="DAYTIME · GRASSLAND"
          description="A striding raptor that hunts snakes on foot across the open savanna."
          footer={<><Tag tone="ochre">Raptor</Tag><Button size="sm" variant="ghost" iconRight={<i className="ph ph-arrow-right" />}>View</Button></>}
        />
        <Card
          overlay
          mediaHeight={300}
          media={<PhotoPlate wash="dawn" icon="mountains" />}
          eyebrow={<Eyebrow rule color="var(--ochre-300)">Region</Eyebrow>}
          title="Sabie River"
          description="Golden-hour game drives along the park's southern lifeline."
        />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
