<style>
  body { margin: 0; background: var(--surface-page); padding: 28px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
  .lbl { font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); width: 100%; margin-bottom: 4px; }
  .strip { display: flex; gap: 36px; padding-top: 8px; border-top: 1px solid var(--border-subtle); }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Eyebrow, Tag, Badge, StatBlock } = window.KrugerWildDesignSystem_6ab219;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="lbl">Eyebrow</span>
          <Eyebrow rule>Field Guide</Eyebrow>
          <Eyebrow color="var(--text-brand)">Conservation</Eyebrow>
        </div>
        <div className="row"><span className="lbl">Tags</span>
          <Tag tone="green" icon={<i className="ph ph-tree" />}>Riverine forest</Tag>
          <Tag tone="ochre" icon={<i className="ph ph-sun-horizon" />}>Open savanna</Tag>
          <Tag tone="clay">Rocky koppies</Tag>
          <Tag tone="teal" icon={<i className="ph ph-drop" />}>Wetland</Tag>
          <Tag tone="neutral" interactive selected>Big Five</Tag>
        </div>
        <div className="row"><span className="lbl">Conservation status (IUCN)</span>
          <Badge status="lc" /><Badge status="nt" /><Badge status="vu" /><Badge status="en" /><Badge status="cr" />
        </div>
        <div className="row"><span className="lbl">Stat strip</span>
          <div className="strip">
            <StatBlock value="19,485" label="Park area (km²)" />
            <StatBlock value="147" label="Mammal species" divider />
            <StatBlock value="507" label="Bird species" divider />
            <StatBlock value="1898" label="Established" divider />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
