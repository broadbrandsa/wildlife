<!-- @dsCard group="Spacing" viewport="700x170" name="Corner Radii" subtitle="xs → 2xl → pill · soft, organic corners" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-card);padding:22px;font-family:var(--font-mono);display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
.box{width:84px;height:84px;background:var(--green-100);border:1.5px solid var(--green-300)}
.lab{display:block;text-align:center;font-size:0.6rem;color:var(--text-muted);margin-top:7px}</style></head>
<body>
  <div><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lab">xs · 4</span></div>
  <div><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">sm · 8</span></div>
  <div><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">md · 12</span></div>
  <div><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">lg · 18 (card)</span></div>
  <div><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lab">xl · 28</span></div>
  <div><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="lab">2xl · 40</span></div>
  <div><div class="box" style="border-radius:var(--radius-pill)"></div><span class="lab">pill</span></div>
</body></html>
