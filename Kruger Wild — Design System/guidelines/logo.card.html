<!-- @dsCard group="Brand" viewport="700x230" name="Logo & Wordmark" subtitle="Acacia emblem + Spectral wordmark · clear space, on-dark" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:24px;font-family:var(--font-sans);display:flex;gap:24px;flex-wrap:wrap;align-items:stretch}
  .panel{flex:1;min-width:230px;display:flex;align-items:center;gap:16px;padding:22px;border-radius:var(--radius-lg);box-shadow:var(--ring-hairline)}
  .lockup{display:flex;flex-direction:column;line-height:1}
  .word{font-family:var(--font-serif);font-weight:600;font-size:1.7rem;letter-spacing:-0.01em}
  .tag{font-family:var(--font-mono);font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;margin-top:5px}
</style></head>
<body>
  <div class="panel" style="background:var(--surface-page)">
    <img src="../assets/logo/kruger-wild-mark.svg" width="64" height="64" alt="Kruger Wild mark">
    <div class="lockup">
      <span class="word" style="color:var(--green-900)">Kruger Wild</span>
      <span class="tag" style="color:var(--ochre-700)">South Africa · Est. 1898</span>
    </div>
  </div>
  <div class="panel" style="background:var(--green-900)">
    <span style="color:var(--ochre-300);display:inline-flex"><img src="../assets/logo/kruger-wild-mark-mono.svg" width="58" height="58" alt="Kruger Wild mark mono"></span>
    <div class="lockup">
      <span class="word" style="color:var(--sand-50)">Kruger Wild</span>
      <span class="tag" style="color:var(--ochre-300)">South Africa · Est. 1898</span>
    </div>
  </div>
</body></html>
