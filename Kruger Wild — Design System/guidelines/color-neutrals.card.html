<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>

<body>

  <div class="sw" style="background:var(--sand-150);color:var(--sand-900)">150</div>

  <div class="sw" style="background:var(--sand-600);color:#fff">600</div>
  <div class="sw" style="background:var(--sand-700);color:#fff">700·txt</div>
  <div class="sw" style="background:var(--sand-800);color:#fff">800</div>
