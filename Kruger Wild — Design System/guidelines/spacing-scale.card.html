<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="8px base rhythm · space-1 → space-12" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-card);padding:22px 24px;font-family:var(--font-mono)}
.row{display:flex;align-items:center;gap:14px;margin-bottom:9px}
.bar{height:16px;background:var(--ochre-400);border-radius:3px}
.tok{font-size:0.62rem;color:var(--text-muted);width:84px}
.val{font-size:0.62rem;color:var(--text-secondary)}</style></head>
<body>
  <div class="row"><span class="tok">space-2</span><span class="bar" style="width:8px"></span><span class="val">8px</span></div>
  <div class="row"><span class="tok">space-4</span><span class="bar" style="width:16px"></span><span class="val">16px</span></div>
  <div class="row"><span class="tok">space-5</span><span class="bar" style="width:24px"></span><span class="val">24px</span></div>
  <div class="row"><span class="tok">space-6</span><span class="bar" style="width:32px"></span><span class="val">32px</span></div>
  <div class="row"><span class="tok">space-8</span><span class="bar" style="width:48px"></span><span class="val">48px</span></div>
  <div class="row"><span class="tok">space-9</span><span class="bar" style="width:64px"></span><span class="val">64px</span></div>
  <div class="row"><span class="tok">space-12</span><span class="bar" style="width:96px"></span><span class="val">96px</span></div>
</body></html>
