<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  body{margin:0;background:var(--surface-card);padding:22px 24px;font-family:var(--font-mono)}
  .grid{display:flex;gap:26px;flex-wrap:wrap;color:var(--green-800)}
  .ico{display:flex;flex-direction:column;align-items:center;gap:8px;width:74px}
  .ico i{font-size:30px}
  .ico span{font-size:0.56rem;color:var(--text-muted);letter-spacing:0.04em}
</style></head>
<body>
  <div class="grid">
    <div class="ico"><i class="ph ph-paw-print"></i><span>paw-print</span></div>
    <div class="ico"><i class="ph ph-tree"></i><span>tree</span></div>
    <div class="ico"><i class="ph ph-bird"></i><span>bird</span></div>
    <div class="ico"><i class="ph ph-binoculars"></i><span>binoculars</span></div>
    <div class="ico"><i class="ph ph-mountains"></i><span>mountains</span></div>
    <div class="ico"><i class="ph ph-sun-horizon"></i><span>sun-horizon</span></div>
    <div class="ico"><i class="ph ph-footprints"></i><span>footprints</span></div>
    <div class="ico"><i class="ph ph-map-trifold"></i><span>map-trifold</span></div>
    <div class="ico"><i class="ph ph-leaf"></i><span>leaf</span></div>
    <div class="ico"><i class="ph ph-tent"></i><span>tent</span></div>
    <div class="ico"><i class="ph ph-drop"></i><span>drop</span></div>
    <div class="ico"><i class="ph ph-compass"></i><span>compass</span></div>
  </div>
</body></html>
