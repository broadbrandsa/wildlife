<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Clay & Weathered Teal" subtitle="Secondary clay (sunset) + cool teal accent" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:18px;font-family:var(--font-mono);display:flex;flex-direction:column;gap:12px}
  .ramp{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--ring-hairline)}
  .sw{flex:1;height:62px;display:flex;align-items:flex-end;padding:7px;font-size:0.58rem;letter-spacing:0.04em}
</style></head>
<body>
<div class="ramp">
  <div class="sw" style="background:var(--clay-100);color:var(--clay-900)">clay 100</div>
  <div class="sw" style="background:var(--clay-200);color:var(--clay-900)">200</div>
  <div class="sw" style="background:var(--clay-300);color:var(--clay-900)">300</div>
  <div class="sw" style="background:var(--clay-400);color:#fff">400</div>
  <div class="sw" style="background:var(--clay-500);color:#fff">500 ·★</div>
  <div class="sw" style="background:var(--clay-700);color:#fff">700</div>
  <div class="sw" style="background:var(--clay-900);color:#fff">900</div>
</div>
<div class="ramp">
  <div class="sw" style="background:var(--teal-100);color:var(--teal-700)">teal 100</div>
  <div class="sw" style="background:var(--teal-300);color:var(--teal-700)">300</div>
  <div class="sw" style="background:var(--teal-500);color:#fff">500 ·★</div>
  <div class="sw" style="background:var(--teal-700);color:#fff">700</div>
</div>
</body></html>
