<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:18px;font-family:var(--font-mono)}
  .ramp{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--ring-hairline)}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:0.62rem;letter-spacing:0.04em}
</style></head>
<body>
<div class="ramp">
  <div class="sw" style="background:var(--ochre-100);color:var(--ochre-900)">100</div>
  <div class="sw" style="background:var(--ochre-200);color:var(--ochre-900)">200</div>
  <div class="sw" style="background:var(--ochre-300);color:var(--ochre-900)">300</div>
  <div class="sw" style="background:var(--ochre-400);color:var(--sand-900)">400</div>
  <div class="sw" style="background:var(--ochre-500);color:#fff">500 ·★</div>
  <div class="sw" style="background:var(--ochre-600);color:#fff">600</div>
  <div class="sw" style="background:var(--ochre-700);color:#fff">700</div>
  <div class="sw" style="background:var(--ochre-900);color:#fff">900</div>
</div>
</body></html>
