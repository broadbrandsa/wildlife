<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Bushveld Green" subtitle="Primary green ramp 50→950" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:18px;font-family:var(--font-mono)}
  .ramp{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--ring-hairline)}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:0.6rem;letter-spacing:0.04em}
</style></head>
<body>
<div class="ramp">
  <div class="sw" style="background:var(--green-50);color:var(--green-900)">50</div>
  <div class="sw" style="background:var(--green-100);color:var(--green-900)">100</div>
  <div class="sw" style="background:var(--green-200);color:var(--green-900)">200</div>
  <div class="sw" style="background:var(--green-300);color:var(--green-900)">300</div>
  <div class="sw" style="background:var(--green-400);color:#fff">400</div>
  <div class="sw" style="background:var(--green-500);color:#fff">500</div>
  <div class="sw" style="background:var(--green-600);color:#fff">600</div>
  <div class="sw" style="background:var(--green-700);color:#fff">700·800</div>
  <div class="sw" style="background:var(--green-800);color:#fff">800</div>
  <div class="sw" style="background:var(--green-900);color:#fff">900</div>
  <div class="sw" style="background:var(--green-950);color:#fff">950</div>
</div>
</body></html>
