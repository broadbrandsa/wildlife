<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="Display → H1–H4 → lead → body → small" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-card);padding:20px 24px}
.line{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px dashed var(--border-subtle)}
.tok{font-family:var(--font-mono);font-size:0.6rem;color:var(--text-muted);width:108px;flex:none;letter-spacing:0.04em}
.spec{color:var(--text-primary)}</style></head>
<body>
  <div class="line"><span class="tok">--text-display</span><span class="spec" style="font-family:var(--font-serif);font-size:2.6rem;font-weight:600;letter-spacing:-0.02em;line-height:1">Bushveld</span></div>
  <div class="line"><span class="tok">--text-h2</span><span class="spec" style="font-family:var(--font-serif);font-size:1.9rem;font-weight:600">Section heading</span></div>
  <div class="line"><span class="tok">--text-h3</span><span class="spec" style="font-family:var(--font-serif);font-size:1.45rem;font-weight:500">Subsection heading</span></div>
  <div class="line"><span class="tok">--text-lead</span><span class="spec" style="font-family:var(--font-sans);font-size:1.25rem;color:var(--text-secondary)">Lead paragraph / standfirst</span></div>
  <div class="line"><span class="tok">--text-base</span><span class="spec" style="font-family:var(--font-sans);font-size:1rem">Body — the default reading size</span></div>
  <div class="line" style="border:none"><span class="tok">--text-sm</span><span class="spec" style="font-family:var(--font-sans);font-size:0.875rem;color:var(--text-muted)">Small · captions &amp; metadata</span></div>
</body></html>
