<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);padding:30px 24px;font-family:var(--font-mono);display:flex;gap:26px;align-items:center;flex-wrap:wrap}

<body>
  <div class="box" style="box-shadow:var(--shadow-xs)">xs</div>
  <div class="box" style="box-shadow:var(--shadow-sm)">sm</div>
  <div class="box" style="box-shadow:var(--shadow-md)">md</div>
  <div class="box" style="box-shadow:var(--shadow-lg)">lg</div>
  <div class="box" style="box-shadow:var(--shadow-xl)">xl</div>
</body></html>
